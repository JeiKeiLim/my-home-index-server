name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# port-manager only supports macOS arm64 (see spec §10 + harness
# §off-device CI). Linux runners are intentionally excluded — the
# libproc cgo scanner has no Linux stub and cross-compilation fails
# by design.
jobs:
  ci:
    name: build / test / lint / e2e
    runs-on: macos-15
    timeout-minutes: 30
    env:
      CGO_ENABLED: "1"
      GOLANGCI_VERSION: v1.62.2
      GO_VERSION: "1.24.x"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: tests/acceptance/e2e/package-lock.json

      - name: Install golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@${GOLANGCI_VERSION}
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: gofmt -s
        run: |
          fmt_out="$(gofmt -s -l .)"
          if [ -n "$fmt_out" ]; then
            echo "::error::gofmt -s reported diffs:"
            echo "$fmt_out"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        run: golangci-lint run --timeout=60s

      - name: go test (race + shuffle)
        run: go test -race -shuffle=on ./...

      - name: Build binary (smoke prerequisite)
        run: make build

      - name: Release build
        run: make release

      - name: Verify release artifact is arm64 darwin
        run: |
          test -f dist/port-manager-darwin-arm64
          file dist/port-manager-darwin-arm64 | grep -q "arm64"
          file dist/port-manager-darwin-arm64 | grep -qi "mach-o"

      - name: Smoke check
        run: ./scripts/smoke.sh

      - name: Install Playwright deps + run e2e
        working-directory: tests/acceptance/e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium
          npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/acceptance/e2e/playwright-report
          if-no-files-found: ignore
          retention-days: 7
